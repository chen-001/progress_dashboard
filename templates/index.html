        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

        .sidebar-item.active { background-color: #e8edff; border-left: 3px solid #4f6ef7; }

        .status-running { background-color: #22c55e; animation: pulse 2s infinite; }
        .status-completed { background-color: #94a3b8; }

        .eta-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 4px; }
.sidebar-item { transition: all 0.15s ease; position: relative; }

        .sidebar-item.active { background-color: #e8edff; border-left: 3px solid #4f6ef7; }
        .sidebar-item .delete-btn { opacity: 0; transition: opacity 0.15s ease; }
        .sidebar-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ef4444 !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; border-radius: 12px; padding: 24px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .log-modal-box { max-width: 960px; width: 95%; max-height: 95vh; display: flex; flex-direction: column; }
        .log-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .log-content {
            background: #fafafa; color: #1e1e1e;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px; padding: 16px; border: 1px solid #e5e7eb;
            border-radius: 8px; overflow: auto; flex: 1; min-height: 200px;
            white-space: pre-wrap; word-break: break-all; line-height: 1.6;
        }
        .log-content::-webkit-scrollbar { width: 8px; height: 8px; }
        .log-content::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .log-content::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .log-content::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
        .log-footer { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    </style>
</head>

<script>
// ==================== 全局状态 ====================
let currentRunId = null;
let allRuns = [];
let searchKeyword = '';
let chartInterval = null;
let chartEta = null;
let chartThroughput = null;
let chartInstantThroughput = null;
let pollingTimer = null;
let wasCurrentRunning = false;  // 追踪当前选中任务是否之前在运行

// ==================== 工具函数 ====================
function formatDuration(secs) {
    if (!secs || secs <= 0) return '--';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    if (h > 0) return `${h}h${m}m`;
    if (m > 0) return `${m}m${s}s`;
    return `${s}s`;
}

function formatThroughput(t) {
    if (!t || t <= 0) return '--';
    if (t >= 1000) return (t / 1000).toFixed(1) + 'k 条/秒';
    return t.toFixed(0) + ' 条/秒';
}

function formatTimestamp(ts) {
    if (!ts) return '--';
    const d = new Date(ts);
    const MM = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    return `${MM}-${dd} ${hh}:${mm}:${ss}`;
}

// ==================== 侧边栏 ====================
function renderRunList(runs) {
    const container = document.getElementById('run-list');
    const filtered = searchKeyword
        ? runs.filter(r => r.backup_file.toLowerCase().includes(searchKeyword.toLowerCase()))
        : runs;
    if (!filtered.length) {
        container.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm">${searchKeyword ? '无匹配结果' : '暂无运行记录'}</div>`;
        return;
    }
    container.innerHTML = filtered.map(run => {
        const isActive = run.run_id === currentRunId;
        const statusClass = run.is_running ? 'status-running' : 'status-completed';
        const statusText = run.is_running ? '运行中' : '已完成';
        const progressPct = (run.progress * 100).toFixed(1);
        return `
            <div class="sidebar-item p-4 cursor-pointer ${isActive ? 'active' : ''}"
                 onclick="selectRun('${run.run_id}')">
                <div class="flex items-center gap-2 mb-1">
                    <span class="status-dot ${statusClass}"></span>
                    <span class="text-sm font-medium text-gray-800 truncate flex-1">${run.backup_file}</span>
                    <button class="delete-btn text-gray-300 hover:text-red-500 p-1" title="删除此任务"
                            onclick="event.stopPropagation(); confirmDeleteRun('${run.run_id}', '${run.backup_file}')">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>
                <div class="text-xs text-gray-400 ml-4">
                    #${run.run_id} · ${statusText} · ${progressPct}%
                </div>
                <div class="mt-2 ml-4">
                    <div class="w-full bg-gray-100 rounded-full h-1.5">
                        <div class="bg-indigo-400 h-1.5 rounded-full" style="width: ${progressPct}%"></div>
                    </div>
                </div>
            </div>`;
    }).join('');
}

// ==================== 选择运行 ====================
async function selectRun(runId) {
    currentRunId = runId;
    const run = allRuns.find(r => r.run_id === runId);
    wasCurrentRunning = run ? run.is_running : false;
    renderRunList(allRuns);
    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('detail-view').classList.remove('hidden');
    await loadRunDetail(runId);
}

// ==================== 加载运行详情 ====================
async function loadRunDetail(runId) {
    const resp = await fetch(`/api/runs/${runId}`);
    const data = await resp.json();
    if (data.error) return;
    renderDetail(data);
}

function renderDetail(data) {
    // 标题
    document.getElementById('detail-title').textContent = data.meta.start_ts || data.run_id;
    // 状态标签
    const statusEl = document.getElementById('detail-status');
    if (data.status === 'completed') {
        statusEl.textContent = '已完成';
        statusEl.className = 'px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-600';
    } else {
        statusEl.textContent = '运行中';
        statusEl.className = 'px-3 py-1 rounded-full text-sm font-medium bg-green-50 text-green-700';
    }
    // 副标题
    const meta = data.meta;
    const subtitleParts = [`批次: ${data.batches.length}/${data.total_batches}`];
    if (meta.total_tasks) subtitleParts.push(`任务: ${meta.total_tasks}`);
    if (meta.total_dates) subtitleParts.push(`日期: ${meta.total_dates}`);
    document.getElementById('detail-subtitle').textContent = subtitleParts.join(' · ');
    document.getElementById('detail-filepath').textContent = data.filepath || '';

    // 进度条
    const batchCount = data.batches.length;
    const progress = data.total_batches > 0 ? Math.min(batchCount / data.total_batches, 1.0) : 0;
    document.getElementById('detail-progress-bar').style.width = (progress * 100) + '%';

    // 统计卡片
    const lastElapsed = data.elapsed.length ? data.elapsed[data.elapsed.length - 1] : 0;
    const lastCollected = data.collected.length ? data.collected[data.collected.length - 1] : 0;
    const lastThroughput = data.throughput.length ? data.throughput[data.throughput.length - 1] : 0;
    document.getElementById('stat-elapsed').textContent = formatDuration(lastElapsed);
    document.getElementById('stat-throughput').textContent = formatThroughput(lastThroughput);
    document.getElementById('stat-progress').textContent = (progress * 100).toFixed(1) + '%';
    document.getElementById('stat-last-backup').textContent = data.timestamps && data.timestamps.length > 0
        ? formatTimestamp(data.timestamps[data.timestamps.length - 1]) : '--';

    // ETA 对比
    if (data.eta_series && data.eta_series.global_avg && data.eta_series.global_avg.length > 0) {
        document.getElementById('eta-comparison').classList.remove('hidden');
        const lastIdx = data.eta_series.global_avg.length - 1;
        document.getElementById('eta-global').textContent = '全局平均: ' + formatDuration(data.eta_series.global_avg[lastIdx]);
        document.getElementById('eta-window').textContent = '最近5次: ' + formatDuration(data.eta_series.window_5[lastIdx]);
        document.getElementById('eta-ewma').textContent = 'EWMA: ' + formatDuration(data.eta_series.ewma[lastIdx]);
        document.getElementById('eta-median').textContent = '中位数: ' + formatDuration(data.eta_series.median[lastIdx]);
        // 取 window_5 作为主预估值
        document.getElementById('stat-remaining').textContent = formatDuration(data.eta_series.window_5[lastIdx]);
    } else {
        document.getElementById('eta-comparison').classList.add('hidden');
        document.getElementById('stat-remaining').textContent = '--';
    }

    // 渲染图表
    renderIntervalChart(data);
    renderEtaChart(data);
    renderThroughputChart(data);
    renderInstantThroughputChart(data);
}

// ==================== 图表通用配色 ====================
const chartColors = ['#4f6ef7', '#22c55e', '#f59e0b', '#a855f7'];

function baseChartOption(timestamps) {
    return {
        grid: { left: 60, right: 20, top: 30, bottom: 40 },
        tooltip: {
            trigger: 'axis',
            backgroundColor: '#fff',
            borderColor: '#e5e7eb',
            textStyle: { color: '#374151' },
            formatter: function(params) {
                if (!params || !params.length) return '';
                const idx = params[0].dataIndex;
                const ts = timestamps && timestamps[idx] ? formatTimestamp(timestamps[idx]) : '';
                let html = `<div style="font-weight:600;margin-bottom:4px">备份 #${params[0].axisValue}</div>`;
                if (ts) html += `<div style="font-size:12px;color:#6b7280;margin-bottom:4px">${ts}</div>`;
                params.forEach(p => {
                    html += `<div style="display:flex;align-items:center;gap:6px">
                        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color}"></span>
                        <span>${p.seriesName}: ${p.value != null ? p.value : '--'}</span>
                    </div>`;
                });
                return html;
            }
        },
        xAxis: { type: 'category', axisLine: { lineStyle: { color: '#e5e7eb' } }, axisLabel: { color: '#6b7280' } },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#f3f4f6' } }, axisLabel: { color: '#6b7280' } },
    };
}

// ==================== 备份间隔时长图表 ====================
function renderIntervalChart(data) {
    if (!chartInterval) {
        chartInterval = echarts.init(document.getElementById('chart-interval'));
    }
    const batches = data.batches;
    const intervals = data.intervals;
    const timestamps = data.timestamps || [];
    const base = baseChartOption(timestamps);
    // EWMA 计算
    const alpha = 0.3;
    let ewma = intervals.length > 0 ? intervals[0] : 0;
    const ewmaLine = [ewma];
    for (let i = 1; i < intervals.length; i++) {
        ewma = alpha * intervals[i] + (1 - alpha) * ewma;
        ewmaLine.push(ewma);
    }
    const option = {
        ...base,
        legend: { data: ['间隔时长', 'EWMA'], top: 0, textStyle: { color: '#6b7280', fontSize: 12 } },
        xAxis: { ...base.xAxis, data: batches.map(String), name: '备份序号' },
        yAxis: { ...base.yAxis, name: '秒' },
        series: [
            {

            },

                name: 'EWMA', type: 'line', data: ewmaLine,
                smooth: true, symbol: 'none',
                lineStyle: { color: chartColors[2], width: 2, type: 'dashed' },
                itemStyle: { color: chartColors[2] },
            },
        ],
    };

}

// ==================== ETA 估算对比图表 ====================
function renderEtaChart(data) {
    if (!chartEta) {
        chartEta = echarts.init(document.getElementById('chart-eta'));
    }
    const batches = data.batches;
    const etaSeries = data.eta_series;
    const timestamps = data.timestamps || [];
    const base = baseChartOption(timestamps);
    if (!etaSeries || !etaSeries.global_avg || etaSeries.global_avg.length === 0) {
        chartEta.setOption({ title: { text: '暂无 ETA 数据', left: 'center', top: 'center', textStyle: { color: '#9ca3af' } } }, true);
        return;
    }
    const names = ['全局平均', '最近5次', 'EWMA', '中位数'];
    const keys = ['global_avg', 'window_5', 'ewma', 'median'];
    const series = keys.map((key, i) => ({
        name: names[i], type: 'line', data: etaSeries[key].map(v => v > 0 ? v / 3600 : null),
        smooth: true, symbol: 'none',
        lineStyle: { color: chartColors[i], width: 2 },
        itemStyle: { color: chartColors[i] },
    }));
    const option = {
        ...base,
        legend: { data: names, top: 0, textStyle: { color: '#6b7280', fontSize: 12 } },
        xAxis: { ...base.xAxis, data: batches.map(String), name: '备份序号' },
        yAxis: { ...base.yAxis, name: '小时' },
        series,
    };
    chartEta.setOption(option, true);
}

// ==================== 轮询刷新 ====================
async function refreshRuns() {
    try {
        const resp = await fetch('/api/runs');
        allRuns = await resp.json();
        renderRunList(allRuns);
        document.getElementById('refresh-info').textContent =
            '最后刷新: ' + new Date().toLocaleTimeString();

        // 如果当前选中的是运行中的任务，或者刚从运行中变为已完成，刷新详情
        if (currentRunId) {
            const currentRun = allRuns.find(r => r.run_id === currentRunId);
            if (currentRun && (currentRun.is_running || wasCurrentRunning)) {
                wasCurrentRunning = currentRun.is_running;
                await loadRunDetail(currentRunId);
            }
        }

        // 自动选中新出现的运行中任务（如果没有选中任何任务）
        if (!currentRunId && allRuns.length > 0) {
            const running = allRuns.find(r => r.is_running);
            if (running) {
                await selectRun(running.run_id);
            } else {
                await selectRun(allRuns[0].run_id);
            }
        }
    } catch (e) {
        console.error('刷新失败:', e);
    }
}

// ==================== 初始化 ====================
window.addEventListener('resize', () => {
    chartInterval && chartInterval.resize();
    chartEta && chartEta.resize();
    chartThroughput && chartThroughput.resize();
});

refreshRuns();
const savedTab = localStorage.getItem('dashboardTab');
if (savedTab === 'tasks') {
    switchTab('tasks');
}
pollingTimer = setInterval(refreshRuns, 3000);

// ==================== 删除功能 ====================
async function deleteRun(runId) {
    try {
        const resp = await fetch(`/api/runs/${runId}`, { method: 'DELETE' });
        const result = await resp.json();
        if (result.status === 'ok') {
            if (currentRunId === runId) {
                currentRunId = null;
                wasCurrentRunning = false;
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('detail-view').classList.add('hidden');
            }
            await refreshRuns();
        } else {
            alert('删除失败: ' + (result.error || '未知错误'));
        }
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

function confirmDeleteRun(runId, backupName) {
    const name = backupName || allRuns.find(r => r.run_id === runId)?.backup_file || runId;
    showModal(
        '确认删除',
        `确定要删除任务 "${name}" 的所有进度记录吗？<br><span class="text-xs text-gray-400">此操作不可恢复！</span>`,
        [
            { text: '取消', class: 'px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200' },
            { text: '确认删除', class: 'px-4 py-2 text-sm text-white bg-red-500 rounded-lg hover:bg-red-600', primary: true, action: () => deleteRun(runId) },
        ]
    );
}

// ==================== 通用模态对话框 ====================
function showModal(title, bodyHtml, buttons) {
    // 移除已有 modal
    const existing = document.querySelector('.modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">${title}</h3>
            <div class="text-sm text-gray-600 mb-6">${bodyHtml}</div>
            <div class="flex justify-end gap-3">
                ${buttons.map((b, i) => `<button id="modal-btn-${i}" class="${b.class}">${b.text}</button>`).join('')}
            </div>
        </div>
    `;

    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });

    document.body.appendChild(overlay);

    buttons.forEach((b, i) => {
        const btn = document.getElementById(`modal-btn-${i}`);
        btn.addEventListener('click', () => {
            overlay.remove();
            if (b.action) b.action();
        });
    });
}

// 全局键盘快捷键：ESC 关闭 modal
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const overlay = document.querySelector('.modal-overlay');
        if (overlay) overlay.remove();
    }
});

// ==================== 任务管理 ====================
let tasksPollingTimer = null;

function switchTab(tab) {
    localStorage.setItem('dashboardTab', tab);
    const monitorBtn = document.getElementById('tab-monitor');
    const tasksBtn = document.getElementById('tab-tasks');
    const monitorPanel = document.getElementById('monitor-panel');
    const tasksPanel = document.getElementById('tasks-panel');
    if (tab === 'monitor') {
        monitorBtn.className = 'px-4 py-1.5 text-sm rounded-md font-medium bg-white text-indigo-600 shadow-sm';
        tasksBtn.className = 'px-4 py-1.5 text-sm rounded-md font-medium text-gray-500 hover:text-gray-700';
        monitorPanel.classList.remove('hidden');
        tasksPanel.classList.add('hidden');
        if (tasksPollingTimer) { clearInterval(tasksPollingTimer); tasksPollingTimer = null; }
    } else {
        tasksBtn.className = 'px-4 py-1.5 text-sm rounded-md font-medium bg-white text-indigo-600 shadow-sm';
        monitorBtn.className = 'px-4 py-1.5 text-sm rounded-md font-medium text-gray-500 hover:text-gray-700';
        monitorPanel.classList.add('hidden');
        tasksPanel.classList.remove('hidden');
        refreshTasks();
        if (!tasksPollingTimer) tasksPollingTimer = setInterval(refreshTasks, 5000);
    }
}

async function submitTask() {
    const script = document.getElementById('task-script').value;
    const nJobs = parseInt(document.getElementById('task-njobs').value) || 50;
    const startDate = parseInt(document.getElementById('task-start-date').value) || null;
    const endDate = parseInt(document.getElementById('task-end-date').value) || null;
    if (!script) { document.getElementById('submit-result').textContent = '请输入脚本路径'; return; }
    const body = { script_path: script, n_jobs: nJobs };
    if (startDate) body.start_date = startDate;
    if (endDate) body.end_date = endDate;
    document.getElementById('submit-result').textContent = '提交中...';
    try {
        const resp = await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const result = await resp.json();
        if (result.error) {
            document.getElementById('submit-result').textContent = '❌ ' + (result.error === 'factor_taskd 未运行' ? 'factor_taskd 未运行' : result.error);
        } else {
            document.getElementById('submit-result').textContent = '✅ 已提交，任务ID: ' + result.id;
            document.getElementById('task-script').value = '';
            refreshTasks();
        }
    } catch (e) {
        document.getElementById('submit-result').textContent = '❌ 提交失败: ' + e.message;
    }
}

async function refreshTasks() {
    try {
        const resp = await fetch('/api/tasks');
        const tasks = await resp.json();
        if (tasks.error) return;
        const tbody = document.getElementById('tasks-tbody');
        tbody.innerHTML = tasks.map(t => {
            let progress = '';
            if (t.progress && t.progress.latest) {
                const l = t.progress.latest;
                if (l.collected != null && l.total_tasks) {
                    const pct = (l.collected / l.total_tasks * 100).toFixed(1);
                    progress = l.collected + '/' + l.total_tasks + ' (' + pct + '%)';
                }
            }
            const statusClass = t.status === 'running' ? 'text-green-600' : t.status === 'completed' ? 'text-gray-500' : t.status === 'failed' || t.status === 'cancelled' ? 'text-red-500' : 'text-yellow-600';
            const runActions = t.status === 'running' ? `
                <button onclick="cancelTask(${t.id})" class="text-xs px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 mr-1">取消</button>
                <button onclick="adjustNjobs(${t.id})" class="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 mr-1">调节n_jobs</button>
            ` : '';
            const actions = `
                <button onclick="viewTaskLog(${t.id})" class="text-xs px-2 py-1 bg-gray-50 text-gray-600 rounded hover:bg-gray-100 mr-1">日志</button>
                <button onclick="viewSubprocessLog(${t.id})" class="text-xs px-2 py-1 bg-gray-50 text-gray-600 rounded hover:bg-gray-100 mr-1">子进程日志</button>
                ${runActions}
            `;
            return `<tr class="border-b border-gray-100">
                <td class="py-2 pr-3">${t.id}</td>
                <td class="py-2 pr-3 font-medium">${t.name || '-'}</td>
                <td class="py-2 pr-3 ${statusClass}">${t.status}</td>
                <td class="py-2 pr-3">${t.n_jobs || '-'}</td>
                <td class="py-2 pr-3 text-xs text-gray-400">${t.pid || '-'}</td>
                <td class="py-2 pr-3 text-xs">${progress}</td>
                <td class="py-2 pr-3 text-xs text-gray-400">${t.created_at ? new Date(t.created_at).toLocaleString() : '-'}</td>
                <td class="py-2 pr-3 text-xs text-gray-400">${t.finished_at ? new Date(t.finished_at).toLocaleString() : '-'}</td>
                <td class="py-2">${actions}</td>
            </tr>`;
        }).join('');
    } catch (e) {
        console.error('刷新任务失败:', e);
    }
}

async function cancelTask(id) {
    if (!confirm('确定要取消任务 ' + id + ' 吗？')) return;
    try {
        await fetch('/api/tasks/' + id + '/cancel', { method: 'POST' });
        refreshTasks();
    } catch (e) {
        alert('取消失败: ' + e.message);
    }
}

async function adjustNjobs(id) {
    const njobs = prompt('请输入新的 n_jobs 值（当前运行中的 worker 数）：');
    if (!njobs || isNaN(njobs) || parseInt(njobs) < 1) return;
    try {
        const resp = await fetch('/api/tasks/' + id + '/adjust-njobs', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ n_jobs: parseInt(njobs) })
        });
        const result = await resp.json();
        if (result.status === 'adjusted') {
            refreshTasks();
        } else {
            alert('调节失败: ' + (result.error || '未知错误'));
        }
    } catch (e) {
        alert('调节失败: ' + e.message);
    }
}

// ==================== 查看日志（通用） ====================
function viewLog(taskId, apiPath, title) {
    const existing = document.querySelector('.modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box log-modal-box">
            <div class="log-header mb-4">
                <h3 class="text-lg font-semibold text-gray-800">任务 #${taskId} ${title}</h3>
                <button onclick="this.closest('.modal-overlay').remove()"
                        class="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="log-content" id="log-content-${taskId}">
                <div class="text-center text-gray-400 py-8">加载中...</div>
            </div>
            <div class="log-footer mt-4">
                <button id="log-load-btn-${taskId}" class="hidden"></button>
                <span id="log-info-${taskId}" class="text-xs text-gray-400"></span>
                <button onclick="this.closest('.modal-overlay').remove()"
                        class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 ml-auto">关闭</button>
            </div>
        </div>
    `;
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });
    document.body.appendChild(overlay);

    const contentEl = document.getElementById('log-content-' + taskId);
    if (!contentEl) return;

    const xhr = new XMLHttpRequest();
    xhr.open('GET', apiPath + '?offset=0&limit=1000', true);
    xhr.timeout = 10000;
    xhr.ontimeout = function() { contentEl.textContent = '请求超时，请重试'; };
    xhr.onerror = function() { contentEl.textContent = '网络错误'; };
    xhr.onload = function() {
        if (xhr.status !== 200) { contentEl.textContent = '请求失败: HTTP ' + xhr.status; return; }
        try {
            var data = JSON.parse(xhr.responseText);
        } catch(e) { contentEl.textContent = '解析失败: ' + e.message; return; }
        if (data.error) { contentEl.textContent = '日志服务不可用'; return; }
        var lines = data.total_lines || 0;
        var logText = data.log || '(日志为空)';
        contentEl.textContent = logText;
        contentEl.scrollTop = contentEl.scrollHeight;
        var infoEl = document.getElementById('log-info-' + taskId);
        if (infoEl) infoEl.textContent = lines > 0 ? '共 ' + lines + ' 行' : '';
    };
    xhr.send();
}

function viewTaskLog(taskId) {
    viewLog(taskId, '/api/tasks/' + taskId + '/log', '运行日志');
}

function viewSubprocessLog(taskId) {
    viewLog(taskId, '/api/tasks/' + taskId + '/subprocess-log', '子进程运行日志');
}
